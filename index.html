<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>潛意識信念校準 · 教學體系</title>
<link rel="icon" type="image/png" href="linda-logo.png">
<style>
  :root{--primary:#048bba;--primary-d:#036e94;--primary-l:#E3F2F8;
    --accent:#603f3a;--accent-l:#F5EDEB;--bg:#F8FAFB;--card:#fff;
    --ink:#1F2528;--text:#3C474E;--muted:#74808A;--line:#E4EBF1;
    --shadow:0 6px 24px rgba(4,139,186,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 18px}
  .logo{height:80px;margin-bottom:18px;filter:drop-shadow(0 4px 10px rgba(4,139,186,.2))}
  h1{color:var(--primary-d);font-size:28px;font-weight:800;margin-bottom:8px;text-align:center}
  .sub{color:var(--muted);font-size:14px;margin-bottom:32px;text-align:center}
  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;max-width:720px;width:100%}
  a.card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:24px;
    text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:.2s;display:block}
  a.card:hover{border-color:var(--primary);transform:translateY(-4px)}
  a.card .ic{font-size:36px;margin-bottom:10px}
  a.card .t{font-size:18px;font-weight:800;color:var(--primary-d);margin-bottom:4px}
  a.card .d{font-size:13.5px;color:var(--muted)}
  footer{margin-top:36px;font-size:12.5px;color:var(--muted);text-align:center}
  footer a{color:var(--primary-d);text-decoration:none}
</style>
</head>
<body>
  <img src="linda-logo.png" alt="洋溢人生" class="logo">
  <h1>潛意識信念校準 · 教學體系</h1>
  <div class="sub">請選擇要查看的工具</div>
  <div class="menu">
    <a class="card" href="助教與導師培訓系統.html">
      <div class="ic">🎓</div>
      <div class="t">助教與導師培訓系統</div>
      <div class="d">從學員到導師的成長路徑 — 職責、考核與合作</div>
    </a>
    <a class="card" href="分潤計算機.html">
      <div class="ic">💰</div>
      <div class="t">分潤計算機</div>
      <div class="d">選擇班別與方案，立即算出推廣分潤金額</div>
    </a>
  </div>
  <footer>
    此工具版權屬於
    <a href="https://www.instagram.com/linda_hsyh" target="_blank" rel="noopener">「Linda 洋溢人生潛意識信念專家」</a>
    所有
  </footer>
</body>
</html>
